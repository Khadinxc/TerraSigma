id: 46c6b47b-0b2b-5f09-af55-f4eca4bcf8b7
name: Script Interpreter Spawning Credential Scanner - Linux
description: No description provided
severity: High
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
- Execution
- Collection
query: |-
  DeviceProcessEvents
  | where ((FolderPath endswith "/trufflehog" or FolderPath endswith "/gitleaks") or (ProcessCommandLine contains "trufflehog" or ProcessCommandLine contains "gitleaks")) and (InitiatingProcessFolderPath endswith "/node" or InitiatingProcessFolderPath endswith "/bun")
version: 1.0.0
kind: Scheduled
relevantTechniques:
- T1552
- T1005
- T1059
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: Name
    columnName: InitiatingProcessAccountName
  - identifier: NTDomain
    columnName: InitiatingProcessAccountDomain
  - identifier: Sid
    columnName: InitiatingProcessAccountSid
- entityType: Host
  fieldMappings:
  - identifier: HostName
    columnName: DeviceName
  - identifier: AzureID
    columnName: DeviceId
- entityType: Process
  fieldMappings:
  - identifier: CommandLine
    columnName: ProcessCommandLine
- entityType: File
  fieldMappings:
  - identifier: Directory
    columnName: FolderPath
requiredDataConnectors:
- connectorId: MicrosoftThreatProtection
  dataTypes:
  - DeviceProcessEvents
