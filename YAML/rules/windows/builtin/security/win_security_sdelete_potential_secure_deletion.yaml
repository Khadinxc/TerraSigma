id: 97d289eb-12ec-5350-9587-255d3a8c2208
name: Potential Secure Deletion with SDelete
description: 'Detects files that have extensions commonly seen while SDelete is used to wipe files. Reference: https://github.com/SigmaHQ/sigma/blob/master/rules/windows/builtin/security/win_security_sdelete_potential_secure_deletion.yml - Legitimate usage of SDelete - Files that are interacted with that have these extensions legitimately | Source: https://github.com/SigmaHQ/sigma/blob/master/rules/windows/builtin/security/win_security_sdelete_potential_secure_deletion.yml'
severity: Medium
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- Impact
- DefenseEvasion
query: |-
  DeviceRegistryEvents
  | where RegistryKey endswith ".AAA" or RegistryKey endswith ".ZZZ"
version: 1.0.0
kind: Scheduled
relevantTechniques:
- T1070
- T1027
- T1485
- T1553
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: Name
    columnName: InitiatingProcessAccountName
  - identifier: NTDomain
    columnName: InitiatingProcessAccountDomain
  - identifier: Sid
    columnName: InitiatingProcessAccountSid
- entityType: Host
  fieldMappings:
  - identifier: HostName
    columnName: DeviceName
  - identifier: AzureID
    columnName: DeviceId
- entityType: RegistryKey
  fieldMappings:
  - identifier: Key
    columnName: RegistryKey
requiredDataConnectors:
- connectorId: MicrosoftThreatProtection
  dataTypes:
  - DeviceRegistryEvents
