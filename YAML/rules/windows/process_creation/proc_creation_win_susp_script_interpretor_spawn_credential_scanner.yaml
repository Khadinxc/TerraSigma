id: 2085f75f-22b2-5a3f-b63a-d86d0c193326
name: Script Interpreter Spawning Credential Scanner - Windows
description: No description provided
severity: High
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
- Collection
- Execution
query: |-
  DeviceProcessEvents
  | where ((FolderPath endswith "trufflehog.exe" or FolderPath endswith "gitleaks.exe") or (ProcessCommandLine contains "trufflehog" or ProcessCommandLine contains "gitleaks")) and (InitiatingProcessFolderPath endswith "\\node.exe" or InitiatingProcessFolderPath endswith "\\bun.exe")
version: 1.0.0
kind: Scheduled
relevantTechniques:
- T1552
- T1005
- T1059
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: Name
    columnName: InitiatingProcessAccountName
  - identifier: NTDomain
    columnName: InitiatingProcessAccountDomain
  - identifier: Sid
    columnName: InitiatingProcessAccountSid
- entityType: Host
  fieldMappings:
  - identifier: HostName
    columnName: DeviceName
  - identifier: AzureID
    columnName: DeviceId
- entityType: Process
  fieldMappings:
  - identifier: CommandLine
    columnName: ProcessCommandLine
- entityType: File
  fieldMappings:
  - identifier: Directory
    columnName: FolderPath
requiredDataConnectors:
- connectorId: MicrosoftThreatProtection
  dataTypes:
  - DeviceProcessEvents
