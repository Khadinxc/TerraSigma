id: 0329e0c2-d821-588d-933f-8a97bbeecd75
name: SyncAppvPublishingServer VBS Execute Arbitrary PowerShell Code
description: 'Executes arbitrary PowerShell code using SyncAppvPublishingServer.vbs | Source: https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/syncappvpublishingserver_vbs_execute_arbitrary_powershell_code.tf'
severity: Medium
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- DefenseEvasion
query: |-
  DeviceProcessEvents
  | where ProcessCommandLine contains "\\SyncAppvPublishingServer.vbs" and ProcessCommandLine contains ";"
version: 1.0.0
kind: Scheduled
relevantTechniques:
- T1218
- T1216
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: Name
    columnName: InitiatingProcessAccountName
  - identifier: NTDomain
    columnName: InitiatingProcessAccountDomain
  - identifier: Sid
    columnName: InitiatingProcessAccountSid
- entityType: Host
  fieldMappings:
  - identifier: HostName
    columnName: DeviceName
  - identifier: AzureID
    columnName: DeviceId
- entityType: Process
  fieldMappings:
  - identifier: CommandLine
    columnName: ProcessCommandLine
requiredDataConnectors:
- connectorId: MicrosoftThreatProtection
  dataTypes:
  - DeviceProcessEvents
