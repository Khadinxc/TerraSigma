id: 760eb9b7-aa40-56d2-8e8c-32fede61099a
name: Cloudflared Tunnel Connections Cleanup
description: 'Detects execution of the "cloudflared" tool with the tunnel "cleanup" flag in order to cleanup tunnel connections. - Legitimate usage of Cloudflared. | Source: https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/cloudflared_tunnel_connections_cleanup.tf'
severity: Medium
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- CommandAndControl
query: |-
  DeviceProcessEvents
  | where (ProcessCommandLine contains "-config " or ProcessCommandLine contains "-connector-id ") and (ProcessCommandLine contains " tunnel " and ProcessCommandLine contains "cleanup ")
version: 1.0.0
kind: Scheduled
relevantTechniques:
- T1102
- T1090
- T1572
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: Name
    columnName: InitiatingProcessAccountName
  - identifier: NTDomain
    columnName: InitiatingProcessAccountDomain
  - identifier: Sid
    columnName: InitiatingProcessAccountSid
- entityType: Host
  fieldMappings:
  - identifier: HostName
    columnName: DeviceName
  - identifier: AzureID
    columnName: DeviceId
- entityType: Process
  fieldMappings:
  - identifier: CommandLine
    columnName: ProcessCommandLine
requiredDataConnectors:
- connectorId: MicrosoftThreatProtection
  dataTypes:
  - DeviceProcessEvents
