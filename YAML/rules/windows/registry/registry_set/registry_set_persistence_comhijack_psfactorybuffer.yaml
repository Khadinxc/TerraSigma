id: b1c25825-51d6-5ee7-99cf-4baf1676b7be
name: Potential PSFactoryBuffer COM Hijacking
description: No description provided
severity: High
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- PrivilegeEscalation
- Persistence
query: |-
  DeviceRegistryEvents
