id: a0abf91c-fb1e-5709-b197-8c1b3459c79f
name: Suspicious Space Characters in RunMRU Registry Path - ClickFix
description: No description provided
severity: High
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- Execution
- DefenseEvasion
query: |-
  DeviceRegistryEvents
