id: 1fc231a7-058a-50c4-a058-0208480a271e
name: Network Communication Initiated To Portmap.IO Domain
description: No description provided
severity: Medium
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- CommandAndControl
- Exfiltration
query: |-
  DeviceNetworkEvents
