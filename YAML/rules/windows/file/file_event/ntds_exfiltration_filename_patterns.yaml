id: 947e2f7f-c01a-56b2-86fa-f1860675586b
name: NTDS Exfiltration Filename Patterns
description: 'Detects creation of files with specific name patterns seen used in various tools that export the NTDS.DIT for exfiltration. | Source: https://github.com/SigmaHQ/sigma/blob/master/rules/windows/file/file_event/ntds_exfiltration_filename_patterns.yml'
severity: High
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
query: |-
  DeviceFileEvents
  | where FolderPath endswith "\\All.cab" or FolderPath endswith ".ntds.cleartext"
version: 1.0.0
kind: Scheduled
relevantTechniques:
- T1003
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: Name
    columnName: InitiatingProcessAccountName
  - identifier: NTDomain
    columnName: InitiatingProcessAccountDomain
  - identifier: Sid
    columnName: InitiatingProcessAccountSid
- entityType: Host
  fieldMappings:
  - identifier: HostName
    columnName: DeviceName
  - identifier: AzureID
    columnName: DeviceId
- entityType: File
  fieldMappings:
  - identifier: Directory
    columnName: FolderPath
requiredDataConnectors:
- connectorId: MicrosoftThreatProtection
  dataTypes:
  - DeviceFileEvents
