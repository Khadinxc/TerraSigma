id: 04c9eba5-7f23-5903-8059-f31025c5b928
name: DLL Sideloading Of ShellChromeAPI.DLL
description: No description provided
severity: High
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- DefenseEvasion
- Persistence
- PrivilegeEscalation
