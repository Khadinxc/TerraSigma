id: b6108cb0-815e-5934-bcbf-575731cf596a
name: HackTool - SILENTTRINITY Stager DLL Load
description: 'Detects SILENTTRINITY stager dll loading activity - Unlikely | Source: https://github.com/SigmaHQ/sigma/blob/master/rules/windows/image_load/hacktool_silenttrinity_stager_dll_load.yml'
severity: High
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
- CommandAndControl
query: |-
  DeviceImageLoadEvents
  | where InitiatingProcessVersionInfoFileDescription contains "st2stager"
version: 1.0.0
kind: Scheduled
relevantTechniques:
- T1071
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: Name
    columnName: InitiatingProcessAccountName
  - identifier: NTDomain
    columnName: InitiatingProcessAccountDomain
  - identifier: Sid
    columnName: InitiatingProcessAccountSid
- entityType: Host
  fieldMappings:
  - identifier: HostName
    columnName: DeviceName
  - identifier: AzureID
    columnName: DeviceId
requiredDataConnectors:
- connectorId: MicrosoftThreatProtection
  dataTypes:
  - DeviceImageLoadEvents
